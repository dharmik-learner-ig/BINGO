<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-Time Multiplayer Bingo 🎲</title>
    <style>
        :root {
            --primary-color: #ff6b8b;
            --secondary-color: #70a1ff;
            --bg-color: #f1f2f6;
            --card-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .screen {
            background: var(--card-color);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        #role-screen { display: block; }
        #game-screen { display: none; }

        h1 { 
            color: var(--primary-color); 
            margin: 5px 0 15px 0; 
            font-size: 1.8rem;
        }
        
        .role-indicator { 
            font-weight: 600; 
            color: #57606f; 
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .bingo-tracker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .letter-box {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ced6e0;
            flex: 1;
            max-width: 50px;
            padding: 8px 0;
            border-radius: 10px;
            background-color: #f1f2f6;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-box.active {
            color: white;
            background-color: #ff4757;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
            text-decoration: line-through;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            margin: 0 auto;
        }

        .cell {
            aspect-ratio: 1;
            background-color: #f1f2f6;
            border: 2px solid #ced6e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(1.1rem + 1vw);
            font-weight: 700;
            color: #2f3542;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            touch-action: manipulation;
        }

        .cell.marked {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .cell.opponent-marked {
            border: 3px dashed var(--secondary-color);
        }

        .cell.both-marked {
            background-color: #2ed573;
            color: white;
            border-color: #2ed573;
        }

        .cell.free-space {
            background-color: #ffa502;
            color: white;
            font-size: calc(0.55rem + 1vw);
        }

        .btn {
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .btn-secondary { background-color: var(--secondary-color); }
        
        .btn:disabled {
            background-color: #ced6e0;
            cursor: not-allowed;
        }

        .game-over-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 355px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2ed573;
            margin-bottom: 10px;
        }
        
        .modal-title.lost {
            color: #ff4757;
        }
    </style>
</head>
<body>

    <div class="screen" id="role-screen">
        <h1>Bingo Room 🎲</h1>
        <p style="color: #747d8c; margin-bottom: 20px;">Pick your name to start synced play.</p>
        <button class="btn" id="p1-join-btn" onclick="selectRole('dharmik')">I am Dharmik</button>
        <button class="btn btn-secondary" id="p2-join-btn" onclick="selectRole('avisha')">I am Avisha</button>
    </div>

    <div class="screen" id="game-screen">
        <div class="role-indicator" id="role-display"></div>
        
        <div class="bingo-tracker">
            <div class="letter-box" id="letter-0">B</div>
            <div class="letter-box" id="letter-1">I</div>
            <div class="letter-box" id="letter-2">N</div>
            <div class="letter-box" id="letter-3">G</div>
            <div class="letter-box" id="letter-4">O</div>
        </div>
        
        <div class="grid" id="bingo-grid"></div>
        <button class="btn btn-secondary" style="margin-top: 15px;" onclick="leaveRoom()">Leave Game</button>
    </div>

    <div class="game-over-modal" id="win-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-status-text">🎉 Victory!</div>
            <p id="modal-sub-text" style="color: #57606f; margin-bottom: 20px; font-weight: 500;"></p>
            <button class="btn" onclick="triggerGlobalReset()">Play Again 🔄</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQRquxKenYndFB0zQphPBvinyzIzslW2o",
            authDomain: "bingo-8e1b2.firebaseapp.com",
            databaseURL: "https://bingo-8e1b2-default-rtdb.firebaseio.com",
            projectId: "bingo-8e1b2",
            storageBucket: "bingo-8e1b2.firebasestorage.app",
            messagingSenderId: "873167000774",
            appId: "1:873167000774:web:384431e0a69f5c22afb3c7",
            measurementId: "G-DRDSXYT0LV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const roomPath = 'globalRoom';
        
        let myRole = ''; 
        let opponentRole = '';
        let localBoardStructure = [];
        let lastLoadedResetCounter = null;

        listenToRoomData();

        window.selectRole = function(role) {
            myRole = role;
            opponentRole = (role === 'dharmik') ? 'avisha' : 'dharmik';
            
            document.getElementById('role-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            const formattedName = myRole.charAt(0).toUpperCase() + myRole.slice(1);
            document.getElementById('role-display').textContent = `Playing as: ${formattedName}`;
            
            update(ref(db, roomPath), {
                [myRole]: true
            });
        }

        window.leaveRoom = function() {
            if (myRole) {
                update(ref(db, roomPath), {
                    [myRole]: false
                });
            }
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('role-screen').style.display = 'block';
            myRole = '';
            opponentRole = '';
            lastLoadedResetCounter = null;
        }

        function generateShuffledLayout() {
            let numbers = [];
            for (let i = 1; i <= 25; i++) {
                numbers.push(i);
            }
            for (let i = numbers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
            }
            return numbers;
        }

        function createLocalGrid(numbersLayout) {
            const gridElement = document.getElementById('bingo-grid');
            gridElement.innerHTML = '';
            let counter = 0;

            for (let r = 0; r < 5; r++) {
                localBoardStructure[r] = [];
                for (let c = 0; c < 5; c++) {
                    let isCenter = (r === 2 && c === 2);
                    let valFromPool = numbersLayout[counter++];
                    localBoardStructure[r][c] = isCenter ? "FREE" : valFromPool;
                    
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.id = `cell-${r}-${c}`;
                    
                    if (isCenter) {
                        cell.textContent = "FREE";
                        cell.classList.add('free-space');
                    } else {
                        cell.textContent = localBoardStructure[r][c];
                        const val = localBoardStructure[r][c];
                        cell.addEventListener('click', () => handleCellClick(val));
                    }
                    
                    gridElement.appendChild(cell);
                }
            }
        }

        window.triggerGlobalReset = function() {
            const p1Layout = generateShuffledLayout();
            const p2Layout = generateShuffledLayout();

            set(ref(db, roomPath), {
                clickedNumbers: {},
                dharmikLayout: p1Layout,
                avishaLayout: p2Layout,
                winner: "",
                dharmik: true,
                avisha: true,
                resetCounter: Date.now()
            });
            document.getElementById('win-modal').style.display = 'none';
        }

        function listenToRoomData() {
            onValue(ref(db, roomPath), (snapshot) => {
                const data = snapshot.val() || {};
                
                if (document.getElementById('role-screen').style.display !== 'none') {
                    document.getElementById('p1-join-btn').disabled = data.dharmik === true;
                    document.getElementById('p2-join-btn').disabled = data.avisha === true;
                }

                if (!myRole) return;

                if (!data.dharmikLayout || !data.avishaLayout) {
                    if (myRole === 'dharmik') {
                        triggerGlobalReset();
                    }
                    return;
                }

                const myLayout = myRole === 'dharmik' ? data.dharmikLayout : data.avishaLayout;
                
                // FIX: Only rebuild the board grid if it is empty OR a brand-new reset event was triggered in the DB
                const isNewReset = data.resetCounter && (data.resetCounter !== lastLoadedResetCounter);
                if (document.getElementById('bingo-grid').children.length === 0 || isNewReset) {
                    createLocalGrid(myLayout);
                    if (data.resetCounter) {
                        lastLoadedResetCounter = data.resetCounter;
                    }
                }
                
                renderBoardState(data);
            });
        }

        function handleCellClick(numberValue) {
            onValue(ref(db, `${roomPath}/winner`), (snap) => {
                if(snap.val()) return;
                
                update(ref(db, `${roomPath}/clickedNumbers/${numberValue}`), {
                    [myRole]: true
                });
            }, { onlyOnce: true });
        }

        function renderBoardState(data) {
            const clickedNumbers = data.clickedNumbers || {};
            let trackingMatrix = [];

            for (let r = 0; r < 5; r++) {
                trackingMatrix[r] = [];
                for (let c = 0; c < 5; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    if (!cell) continue;
                    
                    cell.className = 'cell'; 
                    
                    if (r === 2 && c === 2) {
                        cell.classList.add('free-space');
                        trackingMatrix[r][c] = true;
                        continue;
                    }

                    const cellValue = localBoardStructure[r][c];
                    const numberSelections = clickedNumbers[cellValue] || {};

                    const chosenByMe = numberSelections[myRole] === true;
                    const chosenByOpponent = numberSelections[opponentRole] === true;

                    trackingMatrix[r][c] = chosenByMe;

                    if (chosenByMe && chosenByOpponent) {
                        cell.classList.add('both-marked');
                    } else if (chosenByMe) {
                        cell.classList.add('marked');
                    } else if (chosenByOpponent) {
                        cell.classList.add('opponent-marked');
                    }
                }
            }

            let linesCompleted = countCompletedLines(trackingMatrix);
            
            for (let i = 0; i < 5; i++) {
                const letterBox = document.getElementById(`letter-${i}`);
                if (letterBox) {
                    if (i < linesCompleted) {
                        letterBox.classList.add('active');
                    } else {
                        letterBox.classList.remove('active');
                    }
                }
            }

            if (linesCompleted >= 5 && data.winner !== myRole && !data.winner) {
                update(ref(db, roomPath), { winner: myRole });
            }

            const modal = document.getElementById('win-modal');
            const statusText = document.getElementById('modal-status-text');
            const subText = document.getElementById('modal-sub-text');

            if (data.winner) {
                modal.style.display = 'flex';
                
                if (data.winner === myRole) {
                    statusText.textContent = "🎉 VICTORY!";
                    statusText.className = "modal-title";
                    subText.textContent = myRole === 'dharmik' ? "You beat her to Bingo!" : "You beat him to Bingo!";
                } else {
                    statusText.textContent = "🥺 DEFEAT";
                    statusText.className = "modal-title lost";
                    subText.textContent = myRole === 'dharmik' ? "She defeated you!" : "He defeated you!";
                }
            } else {
                modal.style.display = 'none';
            }
        }

        function countCompletedLines(matrix) {
            let totalLines = 0;
            for (let r = 0; r < 5; r++) {
                if (matrix[r] && matrix[r].every(val => val === true)) totalLines++;
            }
            for (let c = 0; c < 5; c++) {
                if (matrix[0] && matrix[0][c] && matrix[1][c] && matrix[2][c] && matrix[3][c] && matrix[4][c]) totalLines++;
            }
            if (matrix[0] && matrix[0][0] && matrix[1][1] && matrix[2][2] && matrix[3][3] && matrix[4][4]) totalLines++;
            if (matrix[0] && matrix[0][4] && matrix[1][3] && matrix[2][2] && matrix[3][1] && matrix[4][0]) totalLines++;
            return totalLines;
        }
    </script>
</body>
</html>
